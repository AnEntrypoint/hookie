name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Stage screenshot for build
        run: cp screenshot.png public/screenshot.png

      - name: Build
        run: bun run build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          VITE_GITHUB_REDIRECT_URI: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/admin
          VITE_GITHUB_OWNER: ${{ github.repository_owner }}
          VITE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Generate static pages
        run: |
          mkdir -p pages-dist dist/pages
          bun run generate-pages
          mv dist/index.html dist/app.html
          cp pages-dist/index.html dist/index.html
          cp pages-dist/*.html dist/pages/ 2>/dev/null || true
          cp pages-dist/robots.txt dist/ 2>/dev/null || true
          cp pages-dist/sitemap.xml dist/ 2>/dev/null || true
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
